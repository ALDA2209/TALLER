{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <span class="logo-gm fs-4">GM</span>
                    <h5 class="mt-2 fw-bold">Crear cuenta</h5>
                    <p class="text-muted small">Regístrate para realizar tus trámites en línea</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Tu nombre completo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Elige un usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Elige una contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-institucional w-100">
                        <i class="bi bi-person-plus"></i> Crear cuenta
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <small class="text-muted">¿Ya tienes cuenta?</small>
                    <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-secondary ms-2">
                        Iniciar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
