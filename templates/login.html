{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <span class="logo-gm fs-4">GM</span>
                    <h5 class="mt-2 fw-bold">Iniciar Sesión</h5>
                    <p class="text-muted small">Portal de Servicios Municipales</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-person"></i> Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-institucional w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar
                    </button>
                </form>
                <hr>
                <div class="text-center mb-2">
                    <small class="text-muted">¿No tienes cuenta?</small>
                    <a href="{{ url_for('registro') }}" class="btn btn-sm btn-outline-secondary ms-2">
                        Registrarse
                    </a>
                </div>
                <div class="text-center">
                    <a href="{{ url_for('admin_login') }}" style="font-size:12px; color:#888;">
                        <i class="bi bi-shield-lock"></i> Acceso personal municipal
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
