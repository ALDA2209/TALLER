{% extends "base.html" %}
{% block title %}Registro de postulante — GestiMuni{% endblock %}
{% block contenido %}
<div class="container py-4" style="max-width:720px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h3 class="fw-bold text-success mb-1"><i class="bi bi-person-plus"></i> Registro de postulante</h3>
      <p class="text-muted">Crea tu cuenta para postular a puestos de trabajo municipales.</p>
      <form method="POST">
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Nombre completo</label><input name="nombre" class="form-control" required></div>
          <div class="col-md-6 mb-3"><label class="form-label">DNI</label><input name="dni" class="form-control" maxlength="8" minlength="8" pattern="[0-9]{8}" required></div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Usuario</label><input name="username" class="form-control" required></div>
          <div class="col-md-6 mb-3"><label class="form-label">Contraseña</label><input type="password" name="password" class="form-control" required></div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label">Correo</label><input type="email" name="email" class="form-control" required></div>
          <div class="col-md-6 mb-3"><label class="form-label">Teléfono</label><input name="telefono" class="form-control"></div>
        </div>
        <button class="btn btn-success"><i class="bi bi-check-circle"></i> Crear cuenta de postulante</button>
        <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Ya tengo cuenta</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
