{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-institucional text-white">
                <i class="bi bi-person-plus"></i> Registrar Nuevo Currículo
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Postulante</label>
                        <input type="text" name="nombre" class="form-control"
                            placeholder="Nombre completo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Puesto al que Postula</label>
                        <input type="text" name="puesto" class="form-control"
                            placeholder="Ej: Secretaria, Técnico, Abogado" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Años de Experiencia</label>
                        <input type="number" name="experiencia" class="form-control"
                            min="0" max="40" placeholder="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nivel de Educación</label>
                        <select name="educacion" class="form-select" required>
                            <option value="">-- Selecciona --</option>
                            <option value="secundaria">Secundaria</option>
                            <option value="tecnico">Técnico</option>
                            <option value="universitario">Universitario</option>
                            <option value="postgrado">Postgrado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Número de Habilidades</label>
                        <input type="number" name="habilidades" class="form-control"
                            min="0" max="20" placeholder="Ej: 5" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-institucional w-100">
                            <i class="bi bi-cpu"></i> Evaluar con ML
                        </button>
                        <a href="{{ url_for('curriculos') }}" class="btn btn-outline-secondary w-100">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
